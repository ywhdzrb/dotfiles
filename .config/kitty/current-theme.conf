# vim:ft=kitty
## Custom: Waybar Unified
## Colors matched to waybar/hyprland Nord setup

# Basic colors
foreground           #d8dee9
background           #2e3440
selection_foreground #eceff4
selection_background #434c5e

# Cursor colors
cursor            #88c0d0
cursor_text_color #2e3440

# URL underline color when hovering with mouse
url_color #88c0d0

# Window border colors and terminal bell colors
active_border_color   #88c0d0
inactive_border_color #4c566a
bell_border_color     #8fbcbb
visual_bell_color     none

# Tab bar colors
active_tab_foreground   #2e3440
active_tab_background   #88c0d0
inactive_tab_foreground #d8dee9
inactive_tab_background #3b4252
tab_bar_background      #2e3440
tab_bar_margin_color    none

# Mark colors (selected completion item & marked text)
mark1_foreground #eceff4
mark1_background #81a1c1
mark2_foreground #d8dee9
mark2_background #3b4252
mark3_foreground #2e3440
mark3_background #88c0d0

# The basic 16 colors — matched to waybar module accents
# black (高对比度)
color0 #4c566a
color8 #7b88a0

# red (CPU, battery critical, network disconnected)
color1 #bf616a
color9 #d08770

# green (disk, battery charging)
color2  #a3be8c
color10 #8fbcbb

# yellow (battery)
color3  #ebcb8b
color11 #d08770

# blue (clock, frost)
color4  #81a1c1
color12 #5e81ac

# magenta (pulseaudio)
color5  #b48ead
color13 #b48ead

# cyan (network, nowplaying, workspace focus)
color6  #88c0d0
color14 #8fbcbb

# white (snow storm)
color7  #e5e9f0
color15 #eceff4
