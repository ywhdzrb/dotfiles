autogenerated = 0 # 移除此行可删除警告信息

# 更多信息请参考 Wiki：
# https://wiki.hypr.land/Configuring/

# 请注意，此处未设置所有可用的设置/选项
# 完整列表请参阅 Wiki

# 您可以将此配置拆分为多个文件
# 分别创建文件后，通过如下方式链接到本文件：
# source = ~/.config/hypr/myColors.conf


################
### 显示器设置 ###
################

# 参见：https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto # 自动检测并使用首选显示器设置

# XWayland 缩放跟随显示器设置（解决高分屏下 X11 应用模糊问题）
xwayland {
  force_zero_scaling = true
}


###################
### 我的程序设置 ###
###################

# 参见：https://wiki.hypr.land/Configuring/Keywords/

# 设置您常用的程序
$terminal = kitty        # 终端程序
$fileManager = thunar    # 文件管理器
#$menu = wofi --show drun -I  # 应用启动器
$menu = rofi -show drun -no-config -theme ~/.config/hypr/menu.rasi  # 应用启动器
$browser = firefox      # 浏览器
$code = code        # 代码编辑器

#############################
### 环境配置 ###
#############################

# 请看 https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,38
env = HYPRCURSOR_SIZE,40
env = HYPRCURSOR_THEME,Future-Cyan-Hyprcursor_Theme
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_MENU_PREFIX, arch-


# 初始化关键后台服务
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=hyprland XCURSOR_SIZE QT_QPA_PLATFORMTHEME
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XCURSOR_SIZE
# 启动 xdg-desktop-portal（修复 OBS 屏幕采集）
exec-once = systemctl --user start hyprland-portal-bridge.service xdg-desktop-portal.service xdg-desktop-portal-hyprland.service

# -------------------------------
# 启动核心组件
# -------------------------------
# Linux Wallpaper Engine
exec-once = linux-wallpaperengine --screen-root eDP-2 --bg 1674220875 --scaling fill --layer bottom

# 启动 mpvpaper 设置动态壁纸
# exec-once = mpvpaper -o "no-audio loop-file" eDP-1 "~/wallpaper/Rei Ayanami.mp4"

# 启动 libinput-gestures 手势守护
exec-once = libinput-gestures

# 启动 hyprswitch 窗口切换预览守护（已废弃，改用 rofi）
# exec-once = hyprswitch init --show-title true

# 启动 Waybar 状态栏
exec-once = waybar

# 启动 Dunst 通知守护进程
exec-once = dunst

# 启动 Polkit 认证代理
exec-once = /usr/lib/polkit-kde-authentication-agent-1

exec-once = fcitx5 -d --replace

#启动粘贴板历史
exec-once = wl-paste --type text --watch cliphist store # 存储文本
exec-once = wl-paste --type image --watch cliphist store # 存储图像
# exec-once = copyq --start-server

# 挂起windows硬盘
# exec-once = sudo mkdir /run/media/C && sudo mount /dev/sda3 /run/media/C 

# 启动网络管理器
exec-once = nm-applet --indicator --no-agent

