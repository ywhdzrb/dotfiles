#############
### 输入 & 触摸板
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0          # 鼠标不动速度

    touchpad {
        natural_scroll        = true   # 自然滚动
        tap-to-click          = true   # 轻点即点击
        drag_lock             = false  # 拖锁（按需）
        scroll_factor         = 1.0    # 滚动速度
        clickfinger_behavior  = true   # 1/2/3 指对应左/右/中
        disable_while_typing  = true   # 打字禁用
        middle_button_emulation = false
    }
}

# libinput-gestures 处理三指手势


# https://wiki.hypr.land/Configuring/Variables/#gestures
#############
### 触摸板手势
#############
gestures {
    #workspace_swipe = true
}

# 给特定设备单独设配置示例
# 详见 https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs
device {
    name = epic-mouse-v1    # 只针对名字叫“epic-mouse-v1”的鼠标
    sensitivity = -0.5      # 把它的速度再放慢一半
}


# -------------------------------
# 键位绑定 (SUPER 键通常是 Win 键)
# -------------------------------
$mainMod = SUPER

# 应用启动器 Rofi
bind = $mainMod, D, exec, $menu # 显示应用列表

# 终端 Kitty
bind = $mainMod, RETURN, exec, $terminal

# firefox
bind = $mainMod, S, exec, $browser

# 文件管理器
bind = $mainMod, E, exec, $fileManager

# 粘贴版历史
bind = SUPER, V, exec, cliphist list | rofi -dmenu -i -p '' -theme ~/.config/hypr/cliphist_menu.rasi | xargs -r -I{} cliphist decode {} | wl-copy

# code
bind = SUPER, C, exec, $code

# 其他常用软件
# QQ (--force-device-scale-factor 解决 Electron 分数缩放检测问题)
bind = SUPER, A, exec, linuxqq --enable-features=UseOzonePlatform --ozone-platform-hint=auto
# 微信
bind = SUPER, W, exec, wechat.sh
# Clash Verge
bind = SUPER, H, exec, clash-verge
# qq音乐
bind = SUPER, M, exec, /opt/SPlayer/SPlayer

# 关闭当前窗口
bind = $mainMod, Q, killactive

# 切换浮动窗口
bind = $mainMod, F, togglefloating

# 切换全屏
bind = $mainMod, U, fullscreen

# 改变窗口焦点（方向键完美适配 Scrolling 布局：上下切换同一列内的窗口，左右切换不同列）
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ========== 窗口切换预览 ==========
bind = ALT, Tab, exec, python3 /home/ywhdzrb/.config/waybar/scripts/switcher.py

# ========== Scrolling 布局专用操作 ==========
# 左右滚动一列（逗号/句号键）
bind = $mainMod, comma,  layoutmsg, move -col
bind = $mainMod, period, layoutmsg, move +col

# 调整当前列宽度（Shift + 逗号/句号）
bind = $mainMod SHIFT, comma,  layoutmsg, colresize -0.05
bind = $mainMod SHIFT, period, layoutmsg, colresize +0.05

# 将当前窗口提升为新列（原 Dwindle 的 pseudo 键位）
bind = $mainMod, P, layoutmsg, promote

# 切换焦点适应方式（居中/边缘贴合）（原 Dwindle 的 togglesplit 键位）
bind = $mainMod, J, layoutmsg, togglefit

# 交换当前列与左侧/右侧的列（原 Dwindle 的 orientationleft/orientationtop 键位）
bind = $mainMod SHIFT, H, layoutmsg, swapcol l
bind = $mainMod SHIFT, V, layoutmsg, swapcol r

# 使当前激活的列填满屏幕宽度
bind = $mainMod, R, layoutmsg, fit active
# ==========================================

# 切换工作区
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# 移动窗口到工作区
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# 滚动浏览工作区
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# 鼠标移动/调整窗口
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# 屏幕亮度控制
bind = , XF86MonBrightnessUp, exec, ~/.config/hypr/backlight --inc
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/backlight --dec

# 音量控制
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/volume --inc
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/volume --dec
bind = , XF86AudioMute, exec, ~/.config/hypr/volume --toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# 截图 (flameshot: 冻结画面 + 框选 + 画笔标注)
bind = $mainMod SHIFT, S, exec, flameshot gui

# OCR 识别 (框选区域 → 识别文字 → 复制到剪贴板)
bind = $mainMod SHIFT, O, exec, ~/.config/waybar/scripts/ocr.sh

# 锁定屏幕
bind = $mainMod, L, exec, hyprlock

# 退出 Hyprland
bind = $mainMod SHIFT, E, exec, ~/.config/hypr/powermenu.sh

##############################
### 窗口和工作区配置 ###
##############################

# 窗口规则和工作区规则配置
# 参见 https://wiki.hyprland/Configuring/Window-Rules/ 获取更多窗口规则信息
# 参见 https://wiki.hyprland/Configuring/Workspace-Rules/ 获取工作区规则信息

# 示例窗口规则
# windowrule = float,class:^(kitty)$,title:^(kitty)$  # 让 kitty 终端应用以浮动窗口形式打开

# 忽略应用程序的最大化请求。您可能会喜欢这个功能。
# 对所有类别的应用程序抑制最大化事件
# windowrule = suppressevent maximize, class:.*

# 修复 XWayland 应用程序的拖动问题
# 此规则针对特定条件的 XWayland 窗口禁用焦点获取：
# - 类名为空 (class:^$)
# - 标题为空 (title:^$)
# - 是 XWayland 应用程序 (xwayland:1)
# - 处于浮动状态 (floating:1)
# - 不是全屏状态 (fullscreen:0)
# - 不是固定状态 (pinned:0)
windowrulev = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# windowrulev2 = float,class:Impala
# windowrulev2 = size 800 600,class:Impala
# windowrulev2 = center,class:Impala

# Waybar 毛玻璃效果
layer_rule = blur, waybar
layer_rule = ignorezero, waybar
