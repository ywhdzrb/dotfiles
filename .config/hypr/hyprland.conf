#####################
### 外观和感觉 ###
#####################

# 外观和感觉相关配置
# 参考 https://wiki.hypr.land/Configuring/Variables/

# 通用设置
general {
    # 窗口之间的间隙（像素）
    gaps_in = 0
    # 窗口与屏幕边缘之间的间隙（像素）
    gaps_out = 0

    # 窗口边框大小（像素）
    border_size = 0

    # 颜色设置说明参见：https://wiki.hypr.land/Configuring/Variables/#variable-types
    # 活动窗口边框颜色 — Nord frost 渐变
    col.active_border = rgba(88c0d0ee) rgba(81a1c1ee) 45deg
    # 非活动窗口边框颜色 — Nord polar night
    col.inactive_border = rgba(4c566a88)

    # 设置为 true 可通过点击并拖动边框和间隙来调整窗口大小
    resize_on_border = true

    # 启用撕裂效果（在开启前请阅读：https://wiki.hypr.land/Configuring/Tearing/）
    allow_tearing = false

    # 默认布局：scrolling（水平滚动布局）
    layout = scrolling
}

# Scrolling 布局专用配置（需要 Hyprland >= 0.54）
# 详见：https://wiki.hyprland.org/Configuring/Scrolling-Layout/
scrolling {
    # 新窗口出现和布局滚动的方向：left / right / down / up
    direction = right

    # 默认列宽（占屏幕宽度的百分比），取值范围 0.1 ~ 1.0
    column_width = 0.5

    # 当工作区只有一列时，是否让该列自动占满整个屏幕
    fullscreen_on_one_column = true

    # 切换窗口焦点时，是否自动滚动视图使焦点窗口可见
    follow_focus = true

    # 焦点窗口进入视野的方式：0=居中，1=边缘贴合
    focus_fit_method = 0
}

# 装饰效果设置（如圆角、阴影、模糊等）
# 参见：https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    # 窗口圆角半径（像素）
    rounding = 0
    # 圆角渲染质量/性能平衡（越高质量越好，但性能开销越大）
    rounding_power = 2

    # 更改焦点窗口和非焦点窗口的不透明度
    active_opacity = 1.0
    inactive_opacity = 0.7

    # 阴影设置
    shadow {
        # 是否启用阴影
        enabled = false
        # 阴影范围（像素）
        range = 6
        # 阴影渲染强度
        render_power = 3
        # 阴影颜色
        color = rgba(0,0,0,44)
    }

    # 模糊效果设置
    # 参见：https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        # 是否启用模糊
        enabled = true
        # 模糊大小
        size = 4
        # 模糊渲染次数（ passes ）
        passes = 2

        # 色彩鲜艳度（增强模糊背景的饱和度）
        vibrancy = 0.2
    }
}

# 动画效果设置
# 参见：https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes

    # -------------- 贝塞尔 --------------
    bezier = smoothOut,     0.25, 1.0, 0.5,  1.0
    bezier = smoothIn,      0.5,  0.0, 0.75, 0.0
    bezier = smoothInOut,   0.65, 0.0, 0.35, 1.0
    bezier = gentle,        0.4,  0.0, 0.2,  1.0

    # -------------- 窗口 --------------
    animation = windows,      1, 4, smoothOut
    animation = windowsIn,    1, 4, smoothOut, slide
    animation = windowsOut,   1, 4, smoothIn,  slide

    # -------------- 边框 / 淡入淡出 --------------
    animation = border,       1, 3, smoothInOut
    animation = fade,         1, 3, gentle
    animation = fadeIn,       1, 3, gentle
    animation = fadeOut,      1, 3, gentle

    # -------------- 图层（浮动、OSD） --------------
    animation = layers,       1, 3.5, smoothOut
    animation = layersIn,     1, 3,   smoothOut, fade
    animation = layersOut,    1, 3,   smoothIn,  fade
    animation = fadeLayersIn, 1, 2.5, gentle
    animation = fadeLayersOut,1, 2.5, gentle

    # -------------- 工作区 --------------
    animation = workspaces,     1, 5, gentle, slide
    animation = workspacesIn,   1, 5, gentle, slide
    animation = workspacesOut,  1, 5, gentle, slide
}

# 工作区规则配置
# 参考：https://wiki.hypr.land/Configuring/Workspace-Rules/
# “智能间隙” / “仅有一个窗口时无间隙”
# 如果您希望使用此功能，请取消注释以下所有行
# workspace = w[tv1], gapsout:0, gapsin:0          # 在工作区 'tv1' 上禁用所有间隙
# workspace = f[1], gapsout:0, gapsin:0            # 在浮动工作区 1 上禁用所有间隙
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1] # 在 'tv1' 工作区上禁用非浮动窗口的边框
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]   # 在 'tv1' 工作区上禁用非浮动窗口的圆角
# windowrule = bordersize 0, floating:0, onworkspace:f[1]   # 在浮动工作区 1 上禁用非浮动窗口的边框
# windowrule = rounding 0, floating:0, onworkspace:f[1]     # 在浮动工作区 1 上禁用非浮动窗口的圆角

# Dwindle 布局配置（已切换为 Scrolling，此处保留但不会被使用）
dwindle {
    # pseudotile = true
    preserve_split = true
    force_split = 0
    smart_split = false
    smart_resizing = true
    split_width_multiplier = 1.0
}

# Master 布局配置（已切换为 Scrolling，此处保留但不会被使用）
master {
    new_status = master
}

# 杂项设置
# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    
    # 确保拖拽功能启用
    enable_swallow = 0
    swallow_regex = ^(kitty)$
    
    # 拖拽相关设置
    mouse_move_enables_dpms = true
    focus_on_activate = true
    # no_direct_scanout = true
    
    # 新窗口分割行为
    on_focus_under_fullscreen = 2
    
    # 确保禁用动画干扰拖拽
    disable_autoreload = true
}


